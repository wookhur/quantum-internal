<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #f7f7f7; }
  .offline .runner-container { height: 150px; max-width: 600px; overflow: hidden; position: absolute; top: 15px; width: 44px; }
  .offline .runner-canvas { height: 150px; max-width: 600px; opacity: 1; overflow: hidden; position: absolute; top: 0; z-index: 2; }
  .offline .controller { background: rgba(247,247,247,.1); height: 100vh; left: 0; position: absolute; top: 0; width: 100vw; z-index: 1; }
  .arcade-mode, .arcade-mode .runner-container, .arcade-mode .runner-canvas { image-rendering: pixelated; max-width: 100%; overflow: hidden; }
  .arcade-mode .interstitial-wrapper { height: 100vh; max-width: 100%; overflow: hidden; }
  .arcade-mode .runner-container { left: 0; margin: auto; right: 0; transform-origin: top center; transition: transform 250ms cubic-bezier(0.4,0,1,1) 400ms; z-index: 2; }
  .interstitial-wrapper { margin: 0 auto; max-width: 600px; padding-top: 10px; width: 100%; position: relative; }
  #offline-resources { display: none; }
</style>
</head>
<body class="offline">
  <div class="interstitial-wrapper">
    <div id="main-content" style="display:none"></div>
  </div>
  <div id="offline-resources">
    <img id="offline-resources-1x" src="/offline-sprite-1x.png">
    <img id="offline-resources-2x" src="/offline-sprite-2x.png">
  </div>
  <script src="/trex-runner.js"></script>
  <script>
    // Initialize game
    new Runner('.interstitial-wrapper');

    // Auto-focus so keyboard events work inside iframe
    window.focus();
    document.addEventListener('click', function() { window.focus(); });

    // Expose score to parent via postMessage
    window.onTRexGameOver = function(score, highScore) {
      window.parent.postMessage({ type: 'TREX_GAME_OVER', score: score, highScore: highScore }, '*');
    };
  </script>
</body>
</html>
